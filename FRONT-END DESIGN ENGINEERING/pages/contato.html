<!doctype html>
<html lang="pt-br">
    <!-- Integração do chatbot IBM Watson Assistant -->
    <script>

        window.watsonAssistantChatOptions = {

            // ID da integração criada no IBM Watson
            integrationID: "79fb87eb-c816-4fd3-aa18-846c47cedc20",

            // Região onde o serviço está hospedado
            region: "https://integrations.us-south.assistant.watson.appdomain.cloud",

            // ID da instância do serviço Watson Assistant
            serviceInstanceID: "0177986c-b5c0-4d7f-a7f8-b4a819fe3eaa",

            // Renderiza o chatbot ao carregar
            onLoad: async (instance) => {
                await instance.render();
            }
        };

        // Carrega dinamicamente o script do chatbot
        setTimeout(function () {

            const t = document.createElement('script');

            t.src =
                "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
                (window.watsonAssistantChatOptions.clientVersion || 'latest') +
                "/WatsonAssistantChatEntry.js";

            document.head.appendChild(t);

        });

    </script>

    <!-- Script principal do projeto -->
    <script src="../js/script.js"></script>
<head>

    <!-- Configurações básicas da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título exibido na aba do navegador -->
    <title>OrbitSafe - Contato</title>

    <!-- Arquivos de estilo da página -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/contato.css">

</head>

<body>

    <!-- Cabeçalho principal com logo e menu de navegação -->
    <header class="cabecalho">

        <nav class="cabecalho__navbar">

            <a href="../index.html" class="cabecalho__logo">
                <img src="../assets/logo.png" alt="Logo OrbitSafe">
            </a>

            <button id="menu-toggle" class="cabecalho__hamburger">
                ☰
            </button>

            <ul class="cabecalho__lista" id="nav-menu">

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="../index.html">
                        Home
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="sobre.html">
                        Sobre
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="monitoramento.html">
                        Monitoramento
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="dashboard.html">
                        Dashboard
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="faq.html">
                        FAQ
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link cabecalho__link--active" href="contato.html">
                        Contato
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="integrantes.html">
                        Integrantes
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <!-- Conteúdo principal da página -->
    <main class="contato">

        <!-- Título da seção de contato -->
        <section class="contato__titulo">

            <h1>FALE CONOSCO</h1>

            <p>
                Envie sua mensagem para a equipe OrbitSafe.
            </p>

        </section>



        <!-- Formulário de contato -->
        <section class="contato__formulario">

            <!-- Tratamento do envio via JavaScript -->
            <form id="form-contato">

                <!-- Campo Nome -->
                <div class="grupo-campo">

                    <label for="nome">
                        Nome Completo
                    </label>

                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">

                </div>


                <!-- Campo E-mail -->
                <div class="grupo-campo">

                    <label for="email">
                        E-mail
                    </label>

                    <input type="email" id="email" name="email" required placeholder="email@exemplo.com">

                </div>


                <!-- Campo Assunto -->
                <div class="grupo-campo">

                    <label for="assunto">
                        Assunto
                    </label>

                    <select id="assunto" name="assunto" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="Suporte Técnico">
                            Suporte Técnico
                        </option>

                        <option value="Parcerias">
                            Parcerias
                        </option>

                        <option value="Defesa Civil">
                            Defesa Civil
                        </option>

                    </select>

                </div>


                <!-- Campo Mensagem -->
                <div class="grupo-campo">

                    <label for="mensagem">
                        Mensagem
                    </label>

                    <textarea id="mensagem" name="mensagem" rows="6" required
                        placeholder="Digite sua mensagem"></textarea>

                </div>


                <!-- Botão para envio do formulário -->
                <button type="submit" class="btn-principal">

                    Enviar Mensagem

                </button>

            </form>

        </section>

    </main>



    <!-- Rodapé do site -->
    <footer class="rodape">
        <p>© 2026 OrbitSafe - Global Solution - FIAP</p>
    </footer>

    <!-- Botão flutuante para abertura do SOS -->
    <button class="sos-btn" id="abrirSOS">
        🚨 
    </button>

    <!-- Janela modal utilizada para envio de alertas emergenciais -->
    <div class="sos-modal" id="modalSOS">

        <div class="sos-conteudo">

            <h3>🚨 Emergência</h3>

            <!-- Campo para identificação do usuário -->
            <input type="text" id="sos-nome" placeholder="Nome">

            <!-- Campo para informar localização -->
            <input type="text" id="sos-localizacao" placeholder="Localização">

            <!-- Campo para descrição da ocorrência -->
            <textarea id="sos-mensagem" placeholder="Descreva a situação"></textarea>

            <!-- Botão para envio do alerta -->
            <button class="sos-enviar" id="enviarSOS">
                Transmitir
            </button>

            <!-- Botão para fechar a janela -->
            <button class="sos-fechar" id="fecharSOS">
                Fechar
            </button>

        </div>

    </div>



</body>

</html>
